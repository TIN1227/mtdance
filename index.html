<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT DANCE STUDIO | 自助打卡系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: rgba(16, 39, 74, 0.65);
            --primary-blue: #007bff;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff4081;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #060d1a 0%, #0a192f 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 背景霓虹光暈裝飾 */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
        }
        body::before { top: -50px; left: -50px; background: var(--primary-blue); }
        body::after { bottom: -50px; right: -50px; background: var(--neon-pink); }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 123, 255, 0.2);
            z-index: 1;
            text-align: center;
            position: relative;
        }

        /* LOGO 區塊 */
        .logo-area {
            margin-bottom: 30px;
        }
        .logo-text {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ffffff 30%, var(--neon-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        .logo-sub {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--neon-pink);
            margin-top: 5px;
            font-weight: 700;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 25px;
            color: #cbd5e1;
            font-weight: 400;
        }

        /* 表單與輸入框樣式 */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }
        label {
            display: block;
            font-size: 13px;
            color: var(--neon-cyan);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 18px;
            transition: color 0.3s;
        }
        input, select {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid #1e293b;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }
        input:focus + i, select:focus ~ i {
            color: var(--neon-cyan);
        }

        /* 按鈕樣式 */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-query {
            background: linear-gradient(45deg, #0056b3, var(--primary-blue));
            color: white;
            margin-top: 10px;
        }
        .btn-query:hover {
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
            transform: translateY(-2px);
        }
        .btn-checkin {
            background: linear-gradient(45deg, #d81b60, var(--neon-pink));
            color: white;
            margin-top: 15px;
        }
        .btn-checkin:hover {
            box-shadow: 0 0 15px rgba(255, 64, 129, 0.6);
            transform: translateY(-2px);
        }

        /* 查詢結果面板（動態顯示） */
        .result-panel {
            background: rgba(15, 23, 42, 0.8);
            border: 1px dashed var(--neon-cyan);
            border-radius: 16px;
            padding: 20px;
            margin: 25px 0;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .student-name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }
        .student-count {
            font-size: 14px;
            color: #94a3b8;
        }
        .count-number {
            font-size: 36px;
            font-weight: 900;
            color: var(--neon-cyan);
            margin: 5px 5px 0 5px;
            display: inline-block;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        /* 載入中動畫 */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 遮罩/提示訊息 */
        .overlay-msg {
            color: var(--neon-pink);
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <div class="logo-text">MT</div>
        <div class="logo-sub">Dance Studio</div>
    </div>
    
    <h2><i class="fa-solid fa-qrcode"></i> 學員自主簽到系統</h2>

    <div class="form-group" id="phone-group">
        <label>Step 1. 請輸入您的手機號碼</label>
        <div class="input-wrapper">
            <input type="tel" id="student-phone" placeholder="例如：0912345678" autocomplete="off">
            <i class="fa-solid fa-mobile-screen-button"></i>
        </div>
        <button class="btn-query" id="btn-query" onclick="handleQuery()">
            <span id="btn-query-text">查詢堂數</span>
            <div class="spinner" id="query-spinner"></div>
        </button>
    </div>

    <div class="result-panel" id="result-panel">
        <div class="student-name" id="display-name">張小明 妳好</div>
        <div class="student-count">妳目前的剩餘堂數為：</div>
        <div><span class="count-number" id="display-remaining">0</span>堂</div>
    </div>

    <div id="checkin-area" style="display: none; animation: fadeIn 0.4s ease forwards;">
        <div class="form-group">
            <label>Step 2. 選擇今日上課堂次</label>
            <div class="input-wrapper">
                <select id="course-select">
                    <option value="" disabled selected>-- 請選擇今日課程 --</option>
                    <option value="兒童流行MV (糖糖老師)">兒童流行MV (糖糖老師)</option>
                    <option value="兒童流行MV (田田老師)">兒童流行MV (田田老師)</option>
                    <option value="兒童流行MV (GUGU老師)">兒童流行MV (GUGU老師)</option>
                    <option value="兒童流行MV (心寧老師)">兒童流行MV (心寧老師)</option>
                    <option value="兒童流行MV (Jolin老師)">兒童流行MV (Jolin老師)</option>
                    <option value="進階流行MV (糖糖老師)">進階流行MV (糖糖老師)</option>
                    <option value="進階流行MV (Jolin老師)">進階流行MV (Jolin老師)</option>
                    <option value="兒童KPOP (糖糖老師)">兒童KPOP (糖糖老師)</option>
                    <option value="兒童KPOP (心寧老師)">兒童KPOP (心寧老師)</option>
                    <option value="韓風KPOP (田田老師)">韓風KPOP (田田老師)</option>
                    <option value="韓風KPOP (GUGU老師)">韓風KPOP (GUGU老師)</option>
                    <option value="流行MV (田田老師)">流行MV (田田老師)</option>
                    <option value="流行MV (OO老師)">流行MV (OO老師)</option>
                    <option value="JazzFunk (GUGU老師)">JazzFunk (GUGU老師)</option>
                    <option value="HIP HOP (土員老師)">HIP HOP (土員老師)</option>
                    <option value="HIP HOP (R Kai老師)">HIP HOP (R Kai老師)</option>
                    <option value="Breaking (JT老師)">Breaking (JT老師)</option>
                    <option value="兒童街舞 (JT老師)">兒童街舞 (JT老師)</option>
                    <option value="幼兒律動 (糖糖老師)">幼兒律動 (糖糖老師)</option>
                    <option value="幼兒律動 (維尼老師)">幼兒律動 (維尼老師)</option>
                    <option value="兒童芭蕾 (Jolin老師)">兒童芭蕾 (Jolin老師)</option>
                    <option value="兒童芭蕾 (糖糖老師)">兒童芭蕾 (糖糖老師)</option>
                    <option value="燃脂有氧 (雅涵老師)">燃脂有氧 (雅涵老師)</option>
                    <option value="伸展瑜珈 (糖糖老師)">伸展瑜珈 (糖糖老師)</option>
                    <option value="皮拉提斯 (Sonny老師)">皮拉提斯 (Sonny老師)</option>
                    <option value="芭蕾提斯 (糖糖老師)">芭蕾提斯 (糖糖老師)</option>
                    <option value="中國爵士 (OO老師)">中國爵士 (OO老師)</option>
                    <option value="自主練習/其餘課程">自主練習/其餘課程</option>
                </select>
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
        </div>

        <button class="btn-checkin" id="btn-checkin" onclick="handleCheckIn()">
            <span id="btn-checkin-text"><i class="fa-solid fa-fingerprint"></i> 確認扣課打卡</span>
            <div class="spinner" id="checkin-spinner"></div>
        </button>
    </div>
    
    <div class="overlay-msg" id="error-msg"></div>
</div>

<script>
    // ⚠️ 重要：請把下方引號內換成你剛剛在第5步複製的 Google GAS 網頁應用程式網址！
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzqlyM74EFClkBS5BfxFpJOB-P2MJyvcWCqMicKGR2FzGimtO7bZRddu2gLiYUOH9OnfQ/exec";

    let currentPhone = "";

    // 1. 處理查詢邏輯
    async function handleQuery() {
        const phoneInput = document.getElementById("student-phone").value.trim();
        const errorMsg = document.getElementById("error-msg");
        const btnText = document.getElementById("btn-query-text");
        const spinner = document.getElementById("query-spinner");
        const resultPanel = document.getElementById("result-panel");
        const checkinArea = document.getElementById("checkin-area");

        if (!phoneInput) {
            errorMsg.innerText = "⚠️ 請輸入手機號碼！";
            return;
        }

        // 初始化狀態
        errorMsg.innerText = "";
        btnText.style.display = "none";
        spinner.style.display = "block";
        resultPanel.style.display = "none";
        checkinArea.style.display = "none";

        try {
            const response = await fetch(GAS_API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "query",
                    phone: phoneInput
                })
            });
            const data = await response.json();

            if (data.status === "success") {
                currentPhone = phoneInput; // 鎖定當前查詢的手機
                document.getElementById("display-name").innerText = `${data.name} 妳好！`;
                document.getElementById("display-remaining").innerText = data.remaining;
                
                // 秀出結果面板與打卡區
                resultPanel.style.display = "block";
                checkinArea.style.display = "block";
            } else {
                errorMsg.innerText = `❌ ${data.message}`;
            }
        } catch (err) {
            errorMsg.innerText = "❌ 連線失敗，請檢查網路或確認 API 網址是否正確。";
            console.error(err);
        } finally {
            btnText.style.display = "block";
            spinner.style.display = "none";
        }
    }

    // 2. 處理確認打卡扣課邏輯
    async function handleCheckIn() {
        const courseSelect = document.getElementById("course-select").value;
        const errorMsg = document.getElementById("error-msg");
        const btnText = document.getElementById("btn-checkin-text");
        const spinner = document.getElementById("checkin-spinner");

        if (!courseSelect) {
            errorMsg.innerText = "⚠️ 請選擇今天要上的課程！";
            return;
        }

        errorMsg.innerText = "";
        btnText.style.display = "none";
        spinner.style.display = "block";

        try {
            const response = await fetch(GAS_API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "checkin",
                    phone: currentPhone,
                    course: courseSelect
                })
            });
            const data = await response.json();

            if (data.status === "success") {
                document.getElementById("display-remaining").innerText = data.remaining;
                alert(`🎉 簽到成功！\n${data.name} 已成功扣除 1 堂課，剩餘 ${data.remaining} 堂。`);
                
                // 打卡成功後重置頁面
                document.getElementById("student-phone").value = "";
                document.getElementById("course-select").selectedIndex = 0;
                document.getElementById("result-panel").style.display = "none";
                document.getElementById("checkin-area").style.display = "none";
            } else {
                errorMsg.innerText = `❌ ${data.message}`;
            }
        } catch (err) {
            errorMsg.innerText = "❌ 打卡連線逾時，請洽教室老師。";
        } finally {
            btnText.style.display = "inline-flex";
            spinner.style.display = "none";
        }
    }
</script>
</body>
</html>
